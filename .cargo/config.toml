# Root config. Kept free of `[unstable]` so `cargo test --target
# x86_64-unknown-linux-gnu` does not try to rebuild `core` from source and
# collide with the precompiled `std` the host test harness pulls in.
#
# Bare-metal builds get their `build-std` and target settings either by
# running from inside `kernel/` (where `kernel/.cargo/config.toml` applies)
# or via the aliases below.

[target.'cfg(target_os = "none")']
# bootimage post-processes the kernel ELF into a bootable disk image and
# launches QEMU. Keep here so the `cargo krun` alias picks it up when run
# from the repo root.
runner = "bootimage runner"

[alias]
# Bare-metal build/run from the workspace root. Mirrors what
# `kernel/.cargo/config.toml` does when run from inside `kernel/`.
krun = [
    "run",
    "-Zbuild-std=core,compiler_builtins",
    "-Zbuild-std-features=compiler-builtins-mem",
    "-Zjson-target-spec",
    "--target", "kernel/x86_64-bmdb.json",
    "-p", "bmdb-kernel",
]
kbuild = [
    "build",
    "-Zbuild-std=core,compiler_builtins",
    "-Zbuild-std-features=compiler-builtins-mem",
    "-Zjson-target-spec",
    "--target", "kernel/x86_64-bmdb.json",
    "-p", "bmdb-kernel",
]

# Host-side unit tests for the pure-logic `core` crate.
ctest = ["test", "--target", "x86_64-unknown-linux-gnu", "-p", "bmdb-core"]
