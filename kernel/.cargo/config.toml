[unstable]
json-target-spec = true
# Compile core and compiler_builtins from source for the custom target.
build-std = ["core", "compiler_builtins"]
build-std-features = ["compiler-builtins-mem"]

[build]
target = "x86_64-bmdb.json"

[target.'cfg(target_os = "none")']
# bootimage post-processes the kernel ELF into a bootable disk image and launches QEMU.
runner = "bootimage runner"
